{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration - FSA Agadir</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-bg: #0f172a;
            --admin-card: #1e293b;
            --admin-text: #f8fafc;
            --admin-accent: #3b82f6;
            --admin-accent-hover: #2563eb;
            --admin-danger: #ef4444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--admin-bg);
            color: var(--admin-text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: var(--admin-card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header h2 {
            margin: 0 0 10px;
            font-size: 1.5rem;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background-color: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--admin-accent);
        }

        .btn-login {
            background-color: var(--admin-accent);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--admin-accent-hover);
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--admin-danger);
            border: 1px solid var(--admin-danger);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--admin-accent); margin-bottom: 15px;"></i>
        <h2>Espace Administration</h2>
        <p>Connectez-vous pour accéder au panneau de gestion de la FSA</p>
    </div>

    {% if error %}
    <div class="alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="{% url 'admin_login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="admin" value="{{ request.POST.username }}">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i> Connexion</button>
    </form>
    
    <a href="{% url 'home' %}" class="back-link"><i class="fas fa-arrow-left"></i> Retour au site public</a>
</div>

</body>
</html>
