{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Faculté des Sciences Agadir</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --uiz-blue: #003366; 
            --uiz-gold: #c5a059; 
            --uiz-dark: #0e1111;
            --light-bg: #f4f7f9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--uiz-blue);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            font-weight: 700;
            color: var(--uiz-blue);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #777;
            font-size: 0.9rem;
        }

        .form-label {
            font-weight: 600;
            color: #444;
            font-size: 0.85rem;
        }

        .form-control {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: 0.3s;
            border-left: none; /* Gardé selon ton style */
        }

        .form-control:focus {
            border-color: var(--uiz-blue);
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        .input-group-text {
            background-color: transparent;
            border-right: none;
            color: var(--uiz-blue);
        }

        .btn-login {
            background-color: var(--uiz-blue);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            border: none;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #002244;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 51, 102, 0.2);
            color: white;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: var(--uiz-blue);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .help-text {
            font-size: 0.75rem;
            color: #999;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <div class="mb-3">
            <i class="fas fa-user-circle fa-4x" style="color: var(--uiz-blue);"></i>
        </div>
        <h2>Espace Étudiant</h2>
        <p>Faculté des Sciences Agadir</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 text-center" style="font-size: 0.8rem; border-radius: 10px;">
        <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %} <div class="mb-3">
            <label for="cin" class="form-label">Numéro de CIN</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                <input type="text" class="form-control" id="cin" name="cin" placeholder="Ex: G123456" required>
            </div>
        </div>

        <div class="mb-4">
            <label for="code_etudiant" class="form-label">Code Étudiant (CNE/Massar)</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-key"></i></span>
                <input type="password" class="form-control" id="code_etudiant" name="massar_code" placeholder="Votre code secret" required>
            </div>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt me-2"></i> Se connecter
        </button>
    </form>

    <div class="help-text">
        En cas de problème de connexion, veuillez contacter le service scolarité muni de votre carte d'étudiant.
    </div>

    <div class="back-home">
        <a href="/"><i class="fas fa-arrow-left me-1"></i> Retour à l'accueil</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
